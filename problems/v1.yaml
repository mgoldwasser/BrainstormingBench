# BrainstormingBench seed problem set v1.
#
# FROZEN on 2026-04-12. DO NOT edit this file after release — add a v2.yaml
# instead. Comparability across runs matters more than convenience.
#
# 30 problems across 5 categories (6 each). Each problem is tagged with:
#   horizon:          short | medium | long   (time to implement / see effect)
#   domain_knowledge: helps | neutral | unhelpful
#                     ("helps"     → expertise in the domain should matter)
#                     ("unhelpful" → pure imagination; knowing the field is not
#                                    especially advantageous)
#
# Invariants enforced by this set:
#   - At least 3 problems where domain_knowledge == helps.
#   - At least 3 problems where domain_knowledge == unhelpful.
#   - Mix of horizons. No problems with an obvious single "right answer".

version: 1
frozen_at: 2026-04-12
problems:

  # -------------------------------------------------------------------------
  # product
  # -------------------------------------------------------------------------
  - id: product-01
    category: product
    horizon: medium
    domain_knowledge: neutral
    prompt: "How might a small indie bookstore compete with Amazon?"

  - id: product-02
    category: product
    horizon: short
    domain_knowledge: neutral
    prompt: "Ways to make a standing desk more useful beyond just standing."

  - id: product-03
    category: product
