    domain_knowledge: neutral
    prompt: "Reimagine the household dishwasher for a one-bedroom apartment."

  - id: product-04
    category: product
    horizon: medium
    domain_knowledge: helps
    prompt: "Design a subscription service for people who have just been diagnosed with a chronic illness."

  - id: product-05
    category: product
    horizon: short
    domain_knowledge: helps
